# ─── Gate Selection ────────────────────────────────────────────────
gates:
  char_count: true
  hook_check: true
  em_dash: true
  word_repeat: true
  architecture_leak: true
  audience_named: true
  lesson_surfaced: true
  generic_statement: true
  project_as_subject: true
  closing: true
  frontmatter: true
  dollar_in_note: true
  strategy_void: true
  icp_present: true
  grounded_reference: true

# ─── Posting Cadence ────────────────────────────────────────────────
cadence:
  x:
    per_day: 3
    per_week: 10
  linkedin:
    per_day: 1
    per_week: 3
  blog:
    per_day: 1
    per_week: 2

# ─── Compiler Config ────────────────────────────────────────────────
compiler:
  meaning_axes:
    - systemic
    - behavioral
    - philosophical
    - contrarian
    - leverage
    - human

# ─── Gate Parameters ────────────────────────────────────────────────
gate_params:
  close_detect_window: 200
  close_fallback_phrases: ["note:", "?"]
  word_repeat_scale_small: 500
  word_repeat_scale_medium: 1500
  word_repeat_scale_large_min: 6
  word_repeat_scale_large_max: 12
  required_frontmatter_fields: ["title", "created", "tags", "platform"]

# ─── Voice Markers ──────────────────────────────────────────────────
voice_markers:
  note: "LLM guidance only. See concepts/voice-and-gates.md for details."
