# ─── Gate Selection (which checks are active) ─────────────────────
# Set to false to disable any check without editing code.
gates:
  char_count: true
  hook_check: true
  em_dash: true
  word_repeat: true
  architecture_leak: true
  audience_named: true
  lesson_surfaced: true
  generic_statement: true
  project_as_subject: true
  closing: true
  frontmatter: true
  dollar_in_note: true
  strategy_void: true
  icp_present: true
  grounded_reference: true

# ─── Posting Cadence (rate limits per platform) ─────────────────────
cadence:
  x:
    per_day: 10
    per_week: 70
  linkedin:
    per_day: 3
    per_week: 21
  blog:
    per_day: 1
    per_week: 7

# ─── Template Selector ───────────────────────────────────────────────
# Controls the template recommendation engine (runs between ICP_WORLD_BUILD and DRAFTING).
# Weights sum to 0.90 (0.10 reserved for psych_trigger NLP in future).
template_selector:
  enabled: true
  weights:
    archetype: 0.30       # archetype match (S1-S10 from strategy_classifier)
    meaning_axis: 0.25    # selected_meaning axis match
    funnel_stage: 0.20    # funnel stage match (TOFU/MOFU/BOFU)
    icp_layer: 0.15       # ICP layer match (L1-L4)
  # Ranker scoring weights — used by template_ranker.py to score the registry
  # (substance/archetype/psych_match/anti_density/engagement). Distinct from
  # `weights` above (which drives selector.py's brief-time matching).
  # Falls back to built-in DEFAULT_WEIGHTS if this key is absent. Partial
  # overrides merge onto the defaults. The four content weights are
  # renormalized against engagement at score time, so they need not sum to 1.0.
  ranker_weights:
    substance:       0.30
    archetype:       0.20
    psych_match:     0.20
    anti_density:    0.15
    engagement:      0.15
  top_n:
    x: 5                  # top 5 recommendations for X
    linkedin: 3           # top 3 for LinkedIn
    blog: 2               # top 2 for blog
    pillar: 2             # top 2 for pillar blog
  # BiP category priors — boost certain categories when archetypes match.
  # Used by template_ranker.py + selector.py to weight recommendations.
  # Categories MUST match the registry (templates/registry/viral-templates.yaml):
  #   x: ship_log, product, milestone
  #   linkedin: vulnerability, paradigm, authority
  #   blog: pillar
  # `archetypes: []` (or omitted) means "apply to all archetypes".
  category_priors:
    ship_log:
      archetypes: [S2, S8, S10]
      multiplier: 1.3
    product:
      archetypes: [S2, S8, S1]
      multiplier: 1.4
    milestone:
      archetypes: [S1, S6, S10]
      multiplier: 1.5
    vulnerability:
      archetypes: [S4, S5, S9]
      multiplier: 1.3
    paradigm:
      archetypes: [S9, S3, S7]
      multiplier: 1.4
    authority:
      archetypes: [S6, S4, S1]
      multiplier: 1.5
    pillar:
      archetypes: [S1, S9, S10]
      multiplier: 1.5

# ─── Compiler Config ────────────────────────────────────────────────
# Controls the Content Engine Compiler (runs between STRATEGY_LOAD and DRAFTING).
compiler:
  meaning_axes:
    - systemic
    - behavioral
    - philosophical
    - contrarian
    - leverage
    - human
  # Mode routing: when the user passes a topic to /post, the brief.source.kind
  # is "topic" and the compiler uses the topic-mode 6-question sequence
  # (announce, explain, opinion, etc.). When /post has no args, source.kind is
  # "session" and the build-to-public 8-step sequence runs.
  # These defaults bias the LLM's selected_meaning axis + funnel routing
  # when running in topic mode. They are hints, not hard constraints.
  mode_routing:
    session:
      default_axis: human
      default_funnel: TOFU
      cta: none
      archetype_funnel_override: {}
    topic:
      default_axis: leverage
      default_funnel: MOFU
      cta: try-it
      # When the topic-mode ship (S2) is detected, route to MOFU (with CTA)
      # instead of TOFU (no CTA). Announcements drive installs/usage, not
      # passive authority.
      archetype_funnel_override:
        S2: MOFU
        S8: MOFU

# ─── Gate Parameters (tune algorithmic thresholds) ────────────────
# These control the behavior of gates.py algorithmic checks.
# Edit these, not the script, to change gate sensitivity.
gate_params:
  close_detect_window: 200             # chars from end of body to scan for closing
  close_fallback_phrases: ["note:", "?"]  # non-bank closers (🤝 👊 are emoji checks in code)
  word_repeat_scale_small: 500         # body < this → threshold 3
  word_repeat_scale_medium: 1500       # body < this → threshold 4
  word_repeat_scale_large_min: 6       # body >= medium → max(min, max(12, len//300))
  word_repeat_scale_large_max: 12
  required_frontmatter_fields: ["title", "created", "tags", "platform", "status"]
  # Fix H4: strong_audience_triggers for the audience_named gate. These are
  # higher-signal than the generic audience_triggers list (which is mostly
  # prepositions and too noisy). Edit this list to control what counts as
  # "the reader was named" in the body.
  strong_audience_triggers:
    - "you "
    - "your "
    - "you're"
    - "you'll"
    - "founders"
    - "builders"
    - "if you"
    - "when you"
    - "your team"
    - "your code"
  # Optional strategy fields checked by gates (strategy_void + icp_present):
  # - pillar: which content pillar this draft belongs to (checked by strategy_void gate)
  # - pattern: the content pattern/archetype (checked by strategy_void gate)
  # - icp: the ICP descriptor for this draft (checked by icp_present gate)
  # Either pillar OR pattern must be present; icp must be present.

# ─── Creds Required per Platform ───────────────────────────────────
# Documents which env vars each publisher needs. Post scripts read
# ~/.config/opencode/.env and fail loud if any are missing.
creds_required:
  buffer:   [BUFFER_ACCESS_TOKEN, BUFFER_CHANNEL_IDS]
  x:        [X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_SECRET]
  linkedin: [LINKEDIN_ACCESS_TOKEN, LINKEDIN_PERSON_URN]

# ─── Voice Markers (LLM Guidance — NOT mechanically enforced) ──────
# These are read by the LLM during drafting. They are NOT enforced
# by gates.py. The LLM applies, ignores, or varies them naturally
# based on the post's archetype and voice-corpus examples.
#
# The full voice spec lives in strategy/voice.md.
# The LLM-facing runtime version is in system/prompts/voice.md.
voice_markers:
  note: "LLM guidance only. See strategy/voice.md for details."

# ─── Quality Threshold ────────────────────────────────────────────
# Composite score = (passes / 29 total gates).
# Gates: 15 mechanical (gates.py) + 1 (4-check baseline) + 10 (10-gate extended) + 5 (ICP quality).
# Total = 31 gates. The composite score = (passes / 31) is advisory only —
# not enforced in code (the 15 mechanical checks in `gates.py` are the
# only ones actually computed at GATE_CHECK time).
# Lower threshold = stricter. Raise only with LLM-judged-gate confidence.
quality:
  composite_threshold: 0.85
  gates:
    mechanical: 15
    four_check: 1
    ten_gate: 10
    icp_quality: 5
    total: 31
