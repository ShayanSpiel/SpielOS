  # First-person procedural framing — "we added", "we changed the system",
  # "we updated the schema", "in this session", etc.
  - "\\bwe\\s+added\\b"
  - "\\bwe\\s+changed\\s+(the\\s+system|the\\s+schema|the\\s+pipeline|the\\s+engine)\\b"
  - "\\bwe\\s+updated\\s+(the\\s+system|the\\s+schema|the\\s+pipeline|the\\s+engine)\\b"
  - "\\bin\\s+this\\s+session\\b"
  - "\\bin\\s+this\\s+post\\b"  # meta framing
  - "\\bfor\\s+this\\s+run\\b"  # meta framing

