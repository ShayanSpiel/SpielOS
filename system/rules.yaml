# SpielOS — Single source of truth for all mechanical rules.
# ===============================================================
# Edit this file to change behavior. Scripts read this at startup
# and NEVER have hardcoded values.
#
# A new user should be able to:
#   1. Edit rules.yaml (15 min)
#   2. Edit prompts + templates (30 min)
#   → Engine ready for their voice and strategy
#
# ────────────────────────────────────────────────────────────────────

# ─── Posting Behavior ────────────────────────────────────────────────
posting:
  mode: manual              # manual | auto-always
  require_confirm: [blog, linkedin]
  max_auto_day: 3

# ─── Pipeline Recovery ──────────────────────────────────────────────
# stale_after_minutes: if PUBLISHING/ARCHIVING is older than this, the next
# content command auto-resets to IDLE. Prevents the pipeline from getting
# stuck forever after a half-failed publish.
pipeline:
  stale_after_minutes: 5
  # Fix H2: cap per-file injection size when strategy files are inlined into
  # the LLM handoff. voice-corpus.md is exempt (full examples required).
  strategy_injection_cap_chars: 1500

# ─── Strategy Defaults ──────────────────────────────────────────────
strategy:
  primary_offer: your-offer
  icp_profile: your-icp
  funnel_default: TOFU
  conversion_log: content/conversions.md
  content_verticals:
    - your-first-vertical
    - your-second-vertical
  session_classifier: active

  # Strategy pages the engine loads (maps to strategy/*.md, falls back to concepts/*.md).
  # Edit this list to add/remove pages the LLM reads during STRATEGY_LOAD.
  # Order: positioning/icp/offer (audience side) → methodology/voice/corpus (writing side) → funnel/archetypes/types (routing side).
  pages:
    - positioning
    - icp
    - offer
    - methodology
    - voice
    - corpus
    - funnel
    - archetypes
    - types

  # Heuristic keywords for automatic classification.
  # The classifier scores each archetype/vertical/stage/layer
  # against the session text. Highest score wins.
  archetypes:
    S1_system_build:    ["system build", "built the", "architect", "pipeline", "workflow", "framework", "architecture"]
    S2_ship:            ["ship", "shipped", "released", "deployed", "launched", "v1", "v2", "v3", "feature", "added", "merged", "rolled out", "public beta", "open source"]
    S3_decision:        ["chose", "picked", "decided", "trade-off", "over ", "vs ", "versus"]
    S4_lesson:          ["learned", "lesson", "realised", "realized", "taught me", "discovered"]
    S5_failure:         ["broke", "crash", "failed", "failure", "bug", "went wrong", "postmortem", "post-mortem"]
    S6_client_work:     ["client", "customer", "for a ", "installed for", "case study", "before/after", "wins", "onboarded", "engagement"]
    S7_research:        ["research", "analyzed", "analysed", "reading", "study", "benchmark", "compared"]
    S8_tooling:         ["tool", "script", "automation", "capture", "wrote the", "stack", "setup", "configured"]
    S9_strategy:        ["strategy", "position", "planning", "decided to", "approach", "framework", "positioning"]
    S10_meta:           ["wiki", "vault", "restructur", "consolidat", "archive", "refactor", "AGENTS.md"]  # noqa: E501
  verticals:
    builder-to-lead-system:            ["builder", "lead", "system", "pipeline", "content engine", "automation"]
    content-automation-ai-agents:      ["agent", "automation", "ai", "obsidian", "prompt", "llm"]
    positioning-and-offers:            ["offer", "position", "icp", "price", "pricing", "funnel"]
    building-in-public-as-lead-gen:    ["building in public", "transparent", "public"]
  funnel_stages:
    TOFU:  ["tofu", "awareness", "new", "never", "discover", "first time", "what is"]
    MOFU:  ["mofu", "consideration", "how it", "the system", "mechanism", "framework", "method"]
    BOFU:  ["bofu", "conversion", "buy", "purchase", "price", "offer", "close"]
  icp_layers:
    L1_surface:  ["time", "busy", "too many", "mess", "unorganized", "overlap"]
    L2_mid:      ["system", "method", "approach", "process", "workflow", "how to"]
    L3_deep:     ["identity", "feels like", "status", "threat", "competence", "shame"]
    L4_root:     ["core", "tension", "trade-off", "fundamental", "root"]

# ─── Character Limits (per surface) ─────────────────────────────────
char_limits:
  linkedin_casual: 1500
  linkedin_polished: 3000
  x_single: 280
  x_thread_max_tweets: 12
  blog_pillar_words: 2500
  buffer: 2200           # Buffer per-channel limit (used by post_buffer.py)

# ─── Buffer Multi-Platform Publisher ───────────────────────────────
# post_buffer.py fans a single draft out to all BUFFER_CHANNEL_IDS via
# Buffer's GraphQL API. Direct post_x.py / post_linkedin.py still work
# as fallbacks when platform: x | linkedin is set explicitly.

