version: 2

drafts:
  platforms:
    x:
      max_chars: 280
    linkedin:
      max_chars: 3000
    blog:
      max_words: 2500

banned:
  exact:
    - "Like if you agree"
    - "Share if this resonates"
    - "Follow for more"
  regex:
    - "—"
    - "\\bTOFU\\b"
    - "\\bMOFU\\b"
    - "\\bBOFU\\b"
    - "\\bS[0-9]+\\b"
    - "\\bICP\\b"
    - "\\bcore_insight\\b"

required_frontmatter:
  - title
  - created
  - platform
  - status
  - source
  - reader
  - point
  - angle

checks:
  proof_required: true
  one_point: true
  clear_reader: true

