# ─── Architecture Leaks (internal labels that must NOT be public) ──
architecture_leaks:
  # Session-mode archetypes (banned as labels, NOT the words themselves).
  - "\\bS(?:[1-9]|10)\\b"
  # Funnel-stage labels.
  - "\\bTOFU\\b"
  - "\\bMOFU\\b"
  - "\\bBOFU\\b"
  # ICP problem-layer labels.
  - "\\bL[1-4]\\b"
  # "ICP" as a label (NOT when used as a person's initials in a name).
  - "\\bICP\\b"
  # Pipeline / classifier / gate internal-process labels.
  - "\\bfunnel.stage\\b"
  - "\\bcontent.vertical\\b"
  - "\\bsession.classifier\\b"
  - "\\bgate.check\\b"
  # Compiler internals — banned as labels in public drafts.
  - "\\bcore_insight\\b"
  - "\\bselected_meaning\\b"
  - "\\bICP_WORLD_BUILD\\b"
  - "\\breader_failure_mode\\b"
  - "\\bDATA_BLOCK_SESSION\\b"
  - "\\bDATA_BLOCK_TOPIC\\b"
  # Procedural framing — "the engine runs/does/uses…" as a label for
  # the system itself (does NOT block "engine" used generically).
  - "\\bthe\\s+engine\\s+(runs|uses|does|has|processes|evaluates|analyzes|asks|answers|includes|generates|produces|outputs|reads|builds|follows|checks|filters|scores|ranks|selects|orchestrates|manages|handles)\\b"
