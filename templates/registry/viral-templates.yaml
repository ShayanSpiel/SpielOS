version: 1
platforms:
  x:
    categories:
    - id: listicle
      name: Listicle — Resource Curation
      defaults:
        psych_triggers: [greed, curiosity]
        anti_patterns: [generic_advice]
        body: list
        best_for:
          archetypes: [S4, S8]
          meaning_axes: [leverage, behavioral]
          funnel_stages: [TOFU]
          icp_layers: [L1, L2]
      templates:
      - id: x-listicle-01
        name: 7 free tools for X to achieve Y
        hook: '{number} free tools for {persona} to {result}: 1) {tool_1} — {function_1}, 2) {tool_2} — {function_2}'
        cta: Bookmark this for your {year} stack
      - id: x-listicle-02
        name: Steal these N assets that result Y
        hook: 'Steal these {number} {asset_type} that {result}: {list}'
        cta: RT for your network
    - id: contrarian
      name: Contrarian — Paradigm Shifts
      defaults:
        psych_triggers: [fear, curiosity]
        anti_patterns: [no_emotion, generic_advice]
        body: take
        best_for:
          archetypes: [S3, S9, S5]
          meaning_axes: [contrarian, philosophical]
          funnel_stages: [MOFU]
          icp_layers: [L3, L4]
      templates:
      - id: x-contrarian-01
        name: Unpopular opinion — belief is overrated
        hook: 'Unpopular opinion: {common_belief} is overrated. {pragmatic_alternative}'
        cta: Change my mind
      - id: x-contrarian-02
        name: You have been doing X wrong
        hook: 'You have been doing {topic} wrong. Here is why: {argument}. {alternative}'
        cta: RT if this changed your perspective
    - id: story
      name: Story — Personal Narrative
      defaults:
        psych_triggers: [loss_aversion, hope]
        anti_patterns: [no_emotion, humblebrag]
        body: narrative
        best_for:
          archetypes: [S1, S6]
          meaning_axes: [human, behavioral]
          funnel_stages: [TOFU, MOFU]
          icp_layers: [L2, L3]
      templates:
      - id: x-story-01
        name: I tried X for N days — here is what happened
        hook: 'I tried {experiment} for {number} days. Here is what happened: {result}'
        cta: Follow for more experiments
      - id: x-story-02
        name: N things I learned from failure
        hook: '{number} things I learned from {failure}: {lesson_1}, {lesson_2}'
        cta: RT so others can learn too
    - id: numbered_lessons
      name: Numbered Lessons — Count-Based Wisdom
      defaults:
        psych_triggers: [curiosity, greed]
        anti_patterns: [generic_advice]
        body: list
        best_for:
          archetypes: [S7, S10]
          meaning_axes: [systemic, leverage]
          funnel_stages: [TOFU, MOFU]
          icp_layers: [L1, L2]
      templates:
      - id: x-numbered-01
        name: N lessons I wish I knew before starting
        hook: '{number} lessons I wish I knew before starting {endeavor}: {lesson_1}, {lesson_2}'
        cta: Save this thread for later
      - id: x-numbered-02
        name: N signs you are ready for X
        hook: '{number} signs you are ready for {milestone}: {sign_1}, {sign_2}'
        cta: How many did you check?
    - id: howto
      name: How-To — Step-by-Step
      defaults:
        psych_triggers: [curiosity, greed]
        anti_patterns: [vague_steps]
        body: steps
        best_for:
          archetypes: [S2, S7]
          meaning_axes: [systemic, leverage]
          funnel_stages: [BOFU]
          icp_layers: [L1, L2]
      templates:
      - id: x-howto-01
        name: How to achieve goal in N steps
        hook: 'How to {goal} in {number} steps: 1) {step_1}. 2) {step_2}. 3) {step_3}'
        cta: Bookmark the full guide
      - id: x-howto-02
        name: The N-minute fix for pain
        hook: 'The {time_minutes}-minute fix for {pain_point}: {step_1}, {step_2}'
        cta: Try it today
  linkedin:
    categories:
    - id: story_arc
      name: Story Arc — Problem to Lesson
      defaults:
        psych_triggers: [curiosity, hope]
        anti_patterns: [no_emotion]
        body: narrative
        best_for:
          archetypes: [S1, S6]
          meaning_axes: [human, behavioral]
          funnel_stages: [TOFU]
          icp_layers: [L2, L3]
      templates:
      - id: li-story-01
        name: Last week I noticed something about audience
        hook: 'Last week I {observation}. It made me think about {topic}. Here is what I learned: {lesson}'
        cta: What is your take?
      - id: li-story-02
        name: I used to think belief — now I think truth
        hook: 'I used to think {old_belief}. Now I think {new_truth}. Here is why I changed: {reason}'
        cta: Repost if you had the same shift
    - id: listicle
      name: Listicle — Curated Insights
      defaults:
        psych_triggers: [greed, curiosity]
        anti_patterns: [generic_advice]
        body: list
        best_for:
          archetypes: [S4, S8]
          meaning_axes: [leverage, behavioral]
          funnel_stages: [TOFU]
          icp_layers: [L1, L2]
      templates:
      - id: li-listicle-01
        name: N things every persona should know
        hook: '{number} things every {persona} should know about {topic}: {item_1}, {item_2}'
        cta: Save this for your team
      - id: li-listicle-02
        name: N mistakes I made so you do not have to
        hook: '{number} mistakes I made in {domain} so you do not have to: {mistake_1}, {mistake_2}'
        cta: Comment your own lessons
    - id: contrarian
      name: Contrarian — Challenge Assumptions
      defaults:
        psych_triggers: [fear, anger, curiosity]
        anti_patterns: [no_emotion, generic_advice]
        body: take
        best_for:
          archetypes: [S3, S5]
          meaning_axes: [contrarian, philosophical]
          funnel_stages: [MOFU]
          icp_layers: [L3, L4]
      templates:
      - id: li-contrarian-01
        name: What if common belief is wrong?
        hook: 'What if {common_belief} is actually wrong? Here is why: {argument}'
        cta: Disagree? Let me know in comments
      - id: li-contrarian-02
        name: The thing nobody tells you about X
        hook: 'The thing nobody tells you about {topic}: {hidden_truth}'
        cta: Tag someone who needs to hear this
    - id: observation
      name: Observation — Pattern to Truth
      defaults:
        psych_triggers: [curiosity, pride]
        anti_patterns: [generic_advice]
        body: take
        best_for:
          archetypes: [S2, S10]
          meaning_axes: [systemic, philosophical]
          funnel_stages: [TOFU, MOFU]
          icp_layers: [L2, L3]
      templates:
      - id: li-observation-01
        name: Here is why X happens to everyone
        hook: '{observation}. Here is why it happens: {root_cause}'
        cta: Does this resonate with you?
      - id: li-observation-02
        name: The pattern I see in high performers
        hook: 'After {timeframe} of {context}, I noticed a pattern: {pattern}'
        cta: Repost if you see it too
    - id: framework
      name: Framework — Mental Models
      defaults:
        psych_triggers: [greed, curiosity]
        anti_patterns: [vague_steps]
        body: steps
        best_for:
          archetypes: [S7, S9]
          meaning_axes: [systemic, leverage]
          funnel_stages: [MOFU, BOFU]
          icp_layers: [L2, L3]
      templates:
      - id: li-framework-01
        name: The framework I use to decide on X
        hook: 'The {name} framework for {decision_type}: 1) {step_1}. 2) {step_2}. 3) {step_3}'
        cta: Download the checklist
      - id: li-framework-02
        name: How to evaluate opportunity in N dimensions
        hook: 'How to evaluate {opportunity} in {number} dimensions: {dim_1}, {dim_2}'
        cta: Save this for your next decision
  blog:
    categories:
    - id: pillar_system
      name: Pillar System — How-To & Frameworks
      defaults:
        psych_triggers: [greed, curiosity]
        anti_patterns: [vague_steps]
        body: longform
        best_for:
          archetypes: [S2, S7, S9]
          meaning_axes: [systemic, leverage]
          funnel_stages: [MOFU, BOFU]
          icp_layers: [L2, L3]
      templates:
      - id: blog-system-01
        name: The complete guide to achieving X
        hook: '{result} is not about {common_belief}. It is about {real_factor}. Here is the complete guide.'
        cta: Bookmark this reference
      - id: blog-system-02
        name: How I built system to achieve goal
        hook: 'How I built a {system_type} to {goal} — the exact {number}-step process I used.'
        cta: Steal this system
    - id: pillar_story
      name: Pillar Story — Origin & Case Study
      defaults:
        psych_triggers: [hope, loss_aversion]
        anti_patterns: [humblebrag, no_emotion]
        body: longform
        best_for:
          archetypes: [S1, S6]
          meaning_axes: [human, behavioral]
          funnel_stages: [TOFU, MOFU]
          icp_layers: [L2, L3]
      templates:
      - id: blog-story-01
        name: How I went from A to B in N months
        hook: 'How I went from {starting_point} to {result} in {timeframe} — the honest play-by-play.'
        cta: Share your own story
      - id: blog-story-02
        name: The one decision that changed everything
        hook: 'The one decision that changed my {area} forever: {decision}. Here is why.'
        cta: What was your moment?
    - id: pillar_teardown
      name: Pillar Teardown — Mistakes & Post-Mortems
      defaults:
        psych_triggers: [loss_aversion, curiosity]
        anti_patterns: [generic_advice]
        body: longform
        best_for:
          archetypes: [S3, S5, S10]
          meaning_axes: [contrarian, behavioral]
          funnel_stages: [MOFU]
          icp_layers: [L3, L4]
      templates:
      - id: blog-teardown-01
        name: N mistakes that cost me money
        hook: '{number} mistakes that cost me {amount}: {mistake_1}. Here is what I learned.'
        cta: Avoid these at all costs
      - id: blog-teardown-02
        name: Why common approach fails and what works
        hook: 'Why {common_approach} fails for most people — and what actually works: {alternative}.'
        cta: Read the full breakdown
    - id: pillar_compare
      name: Pillar Compare — X vs Y
      defaults:
        psych_triggers: [greed, fear]
        anti_patterns: [generic_advice]
        body: longform
        best_for:
          archetypes: [S8, S4]
          meaning_axes: [leverage, systemic]
          funnel_stages: [MOFU, BOFU]
          icp_layers: [L1, L2]
      templates:
      - id: blog-compare-01
        name: X vs Y — which one is right for you?
        hook: '{option_a} vs {option_b}: which one is right for {persona}? Here is the honest comparison.'
        cta: Which camp are you in?
      - id: blog-compare-02
        name: The pros and cons of approach that nobody talks about
        hook: 'The pros and cons of {approach} that nobody talks about: {pro_1}, {con_1}.'
        cta: Make an informed choice
    - id: pillar_frame
      name: Pillar Frame — Reframe & Mental Model
      defaults:
        psych_triggers: [curiosity, pride]
        anti_patterns: [generic_advice]
        body: longform
        best_for:
          archetypes: [S9, S10]
          meaning_axes: [philosophical, contrarian]
          funnel_stages: [TOFU, MOFU]
          icp_layers: [L3, L4]
      templates:
      - id: blog-frame-01
        name: Why you should rethink assumption
        hook: 'Why you should rethink {assumption}: {argument}. Here is a better mental model: {model}.'
        cta: Read this with an open mind
      - id: blog-frame-02
        name: The principle that governs X
        hook: 'There is one principle that governs {domain}: {principle}. Here is how it works.'
        cta: Apply this today
