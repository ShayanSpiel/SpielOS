version: 1
platforms:
  x:
    categories:
    - id: listicle
      name: Listyles — Resource Curation
      defaults:
        psych_triggers:
        - greed
        - curiosity
        anti_patterns:
        - generic_advice
        body: list
        best_for:
          archetypes:
          - S4
          - S8
          - S7
          meaning_axes:
          - leverage
          - behavioral
          funnel_stages:
          - TOFU
          icp_layers:
          - L1
          - L2
      templates:
      - id: x-listicle-01
        name: 7 Free tools for X to achieve Y
        hook: '{number} free tools for {persona} to achieve {result}: 1) {tool_1}
          — {function_1}, 2) {tool_2} — {function_2}'
        cta: Bookmark this for your {year} stack
      - id: x-listicle-02
        name: Steal these N assets that result Y
        hook: 'Steal these {number} {asset_type} that {result}: {list}'
        cta: RT for your network
      - id: x-listicle-03
        name: Number lessons I wish I knew timeframe ago
        hook: '{number} {lesson_type} I wish I knew {timeframe} ago about {topic}:
          {list}'
        cta: Follow @{handle} for daily {niche} tips
      - id: x-listicle-04
        name: The subject stack for goal without pain
        hook: 'My personal {category} stack for {goal} without {pain}: {tool_1}, {tool_2}'
        cta: Click the link for the full breakdown
      - id: x-listicle-05
        name: N topic tactics I wish I knew N years ago
        hook: '{number} {topic} tactics I wish I knew {timeframe} ago: 🧵'
        cta: Follow for more {niche} threads
      - id: x-listicle-06
        name: Number resources for audience
        hook: '{number} resources for {audience} to {solve}: {list}'
        cta: Save this thread for later
      - id: x-listicle-07
        name: Number things I learned from experience
        hook: '{number} lessons I learned from {experience}: {lesson_1}, {lesson_2}'
        cta: RT if this helped you
      - id: x-listicle-08
        name: My personal stack for task in year
        hook: 'My personal stack for {task} in {year}: {tool_1}, {tool_2}'
        cta: Follow for more curation
      - id: x-listicle-09
        name: Number subjects that result in N days
        hook: '{number} {asset_type} that {result} in {timeframe}: {list}'
        cta: RT to help a founder
      - id: x-listicle-10
        name: Number lessons I wish I learned at age/phase
        hook: '{number} lessons I wish I learned in my {career_phase}: {lesson_1},
          {lesson_2}'
        cta: Follow for more insights
    - id: contrarian
      name: Contrarian — Paradigm Shifts
      defaults:
        psych_triggers:
        - fear
        - anger
        - curiosity
        - pride
        anti_patterns:
        - no_emotion
        - generic_advice
        body: take
        best_for:
          archetypes:
          - S3
          - S9
          - S5
          meaning_axes:
          - contrarian
          - philosophical
          - behavioral
          funnel_stages:
          - MOFU
          icp_layers:
          - L3
          - L4
      templates:
      - id: x-contrarian-01
        name: Unpopular opinion — belief is overrated
        hook: 'Unpopular opinion: {common_belief} is overrated. {pragmatic_alternative}'
        cta: What's your take?
      - id: x-contrarian-02
        name: You don't need X. You need Y.
        hook: You don't need {popular_item}. You need {better_alternative}
        cta: RT to save a peer
      - id: x-contrarian-03
        name: Common practice is dead. Here's what replaces it.
        hook: '{standard_practice} is dead. Here is what is replacing it for {goal}:
          {new_trend}'
        cta: Follow for the update
      - id: x-contrarian-04
        name: Stop optimizing for vanity metric
        hook: 'Stop optimizing for {metric_a}. Do this instead to build {metric_b}:
          {action}'
        cta: RT for awareness
      - id: x-contrarian-05
        name: Everyone is doing task wrong
        hook: 'Everyone is doing {task} wrong. Here is why {problem} is happening:
          {evidence}'
        cta: Follow for the fix
      - id: x-contrarian-06
        name: The industry doesn't want you to know this
        hook: 'The {industry} does not want you to know this: {revelation}'
        cta: Bookmark before this is deleted
      - id: x-contrarian-07
        name: Subject is not about belief. It's about truth.
        hook: '{topic} is not about {common_belief}. It''s about {actual_truth}'
        cta: Follow for the truth
      - id: x-contrarian-08
        name: Hot take with evidence
        hook: 'Hot take: {opinion}. I have the {evidence_type} to prove it'
        cta: Reply with your take
      - id: x-contrarian-09
        name: Why conventional advice is a scam
        hook: 'Why {conventional_advice} is a scam — and what actually builds {result}:
          {strategy}'
        cta: RT to expose the truth
      - id: x-contrarian-10
        name: Popular belief is failing you
        hook: '{common_advice} is failing you. Here is the alternative: {action}'
        cta: Follow for results
    - id: story
      name: Story — Transformation & Failure
      defaults:
        psych_triggers:
        - hope
        - fear
        - guilt
        - belonging
        anti_patterns:
        - no_emotion
        - buried_value
        body: narrative
        best_for:
          archetypes:
          - S4
          - S5
          - S2
          meaning_axes:
          - human
          - behavioral
          - philosophical
          funnel_stages:
          - TOFU
          - MOFU
          icp_layers:
          - L3
          - L4
      templates:
      - id: x-story-01
        name: I went from low point to high point in N time
        hook: 'I went from {low_point} to {high_point} in {timeframe}. Here is exactly
          how: 🧵'
        cta: Follow for the blueprint
      - id: x-story-02
        name: I achieved X doing simple thing
        hook: I achieved {milestone} doing {simple_habit}. Here's how
        cta: RT to share the simple path
      - id: x-story-03
        name: Time ago I was situation — today transformation
        hook: '{time} ago, I was {scenario}. Today, {success}. Here is what happened'
        cta: Follow my journey
      - id: x-story-04
        name: I almost failed — then insight changed everything
        hook: I almost failed at {task}. Then {pivotal_event} changed everything
        cta: RT for the lesson
      - id: x-story-05
        name: True story — shocking setup with rest
        hook: 'True story: {shocking_setup}. Here is the rest of the story'
        cta: Follow for more
      - id: x-story-06
        name: Last year I made a massive mistake
        hook: Last year, I made a {error_type}. It cost me {loss}. Don't let it happen
          to you
        cta: RT to help others avoid this
      - id: x-story-07
        name: I tested strategy for N time — results shocked me
        hook: I tested {strategy} for {timeframe}. Here is what happened to my {metric}
        cta: Follow for more experiments
      - id: x-story-08
        name: I wasted $Amount on mistake before realizing this
        hook: I wasted ${amount} on {mistake} before realizing this single {topic}
          rule
        cta: RT to save your money
      - id: x-story-09
        name: Nobody believed my claim — now here's proof
        hook: Nobody believed me when I said {claim}. {time} later, here is the proof
        cta: Follow for more proof
      - id: x-story-10
        name: I stopped action — this happened to my metric
        hook: I stopped {action} for {timeframe}. The results shocked my {metric}
        cta: RT if you're trying this
    - id: data
      name: Data — Original Analysis & Proof
      defaults:
        psych_triggers:
        - curiosity
        - fear
        - trust
        - fomo
        anti_patterns:
        - generic_advice
        - no_emotion
        body: analysis
        best_for:
          archetypes:
          - S7
          - S1
          - S10
          meaning_axes:
          - systemic
          - philosophical
          funnel_stages:
          - MOFU
          - TOFU
          icp_layers:
          - L2
      templates:
      - id: x-data-01
        name: I analyzed N items and found pattern
        hook: 'I analyzed {number} {assets} and found {pattern}: {findings}'
        cta: Bookmark for your data bank
      - id: x-data-02
        name: N items analyzed — X% used this opening
        hook: '{number} {assets} analyzed. {percentage} used this exact {element}:
          {result}'
        cta: RT for the strategy
      - id: x-data-03
        name: I reviewed 1,000 items — here are the patterns
        hook: I reviewed 1,000 {niche_assets}. Here are the {number} patterns that
          {result}
        cta: Follow for more analysis
      - id: x-data-04
        name: Tested across N accounts with X% success rate
        hook: 'Tested across {number} {accounts_type} with an {percentage} success
          rate: {framework}'
        cta: RT to help a creator
      - id: x-data-05
        name: The numbers don't lie — stat vs average
        hook: 'The numbers don''t lie: {metric} jumped {percentage} with this single
          change'
        cta: Follow for data-driven tips
      - id: x-data-06
        name: I analyzed 5,000 platform posts
        hook: 'I analyzed 5,000 {platform} posts and found the sweet spot: {metric_detail}'
        cta: RT to share the data
      - id: x-data-07
        name: Data shows high-arousal emotions drive X% more shares
        hook: 'Data shows {emotion_type} drives {percentage} more {metric}. Proof:'
        cta: Follow for more {platform} science
      - id: x-data-08
        name: Analyzed 10,000 viral posts — here are 5 patterns
        hook: 'I analyzed 10,000 viral posts. {number} patterns appeared in {percentage}%.
          Here they are:'
        cta: Bookmark this thread
      - id: x-data-09
        name: Platform algorithm prioritized signal in 2026
        hook: '{platform}''s algorithm prioritized {signal} in {year}. Here is the
          evidence:'
        cta: RT to stay updated
      - id: x-data-10
        name: Metric jumped X% with this single change
        hook: '{metric} jumped {percentage} after I replaced {step_a} with {step_b}'
        cta: Follow for more tests
    - id: interactive
      name: Interactive — Engagement Loops
      defaults:
        psych_triggers:
        - belonging
        - pride
        - greed
        - curiosity
        anti_patterns:
        - no_payoff
        body: question
        best_for:
          archetypes:
          - S6
          - S3
          - S9
          meaning_axes:
          - behavioral
          - human
          funnel_stages:
          - BOFU
          - TOFU
          icp_layers:
          - L1
          - L3
      templates:
      - id: x-interactive-01
        name: In one word describe topic
        hook: 'In one word, describe your biggest {challenge}:'
        cta: Reply below
      - id: x-interactive-02
        name: Drop your asset — I'll send feedback
        hook: Drop your {asset} below. I'll send you 1 {tweak} to {benefit}
        cta: RT and reply
      - id: x-interactive-03
        name: Which is better — A or B?
        hook: 'Which is better for {goal}: A) {option_1} or B) {option_2}?'
        cta: Vote in replies
      - id: x-interactive-04
        name: Question + hint + promise to reveal
        hook: '{question} + {hint} + Promise to reveal in thread: 🧵'
        cta: RT to unlock the answer
      - id: x-interactive-05
        name: Struggling with pain point? I'll help N people
        hook: Struggling with {pain_point}? I'll help {number} people for free today
        cta: Reply with your {asset_or_problem}
      - id: x-interactive-06
        name: What's the biggest niche mistake?
        hook: What's the biggest {niche} mistake you've seen this {timeframe}?
        cta: Share in the replies
      - id: x-interactive-07
        name: Binary choice — concept A vs concept B
        hook: 'Binary choice: {concept_a} vs {concept_b}. Which wins in {year}?'
        cta: Quote tweet with your winner
      - id: x-interactive-08
        name: Reciprocity — share template with everyone who RTs
        hook: I'll share my {valuable_asset} with everyone who RTs this
        cta: RT and DM "{keyword}"
      - id: x-interactive-09
        name: If you could achieve goal by tomorrow
        hook: If you could achieve {goal} by tomorrow, what would you do first?
        cta: Reply with your plan
      - id: x-interactive-10
        name: Trending topic lessons for niche
        hook: Everyone's talking about {trend}. Here are {number} lessons for {audience}
        cta: RT to join the conversation
    - id: ship_log
      name: Ship Log — BiP Core
      defaults:
        psych_triggers:
        - pride
        - fear
        - curiosity
        - belonging
        anti_patterns:
        - generic_advice
        - no_emotion
        body: narrative
        best_for:
          archetypes:
          - S2
          - S8
          - S10
          meaning_axes:
          - behavioral
          - leverage
          - human
          funnel_stages:
          - TOFU
          - MOFU
          icp_layers:
          - L1
          - L2
          - L3
      templates:
      - id: x-ship_log-01
        name: Day N of building X — what shipped
        hook: 'Day {n} of building the engine.


          Shipped: {what_1}, {what_2}, {what_3}.


          Broke: {what_broke}.


          Back to work.'
        cta: Follow for daily build logs
      - id: x-ship_log-02
        name: Shipped at 3am — here's what broke
        hook: 'Shipped at 3am.


          {what_i_thought_was_done} was not done.


          Here''s what actually broke and how I caught it:'
        cta: RT if you've shipped at 3am
      - id: x-ship_log-03
        name: Bug that ate Tuesday
        hook: 'A bug ate my Tuesday.


          Not a {big_problem}. A {small_typo}.


          {lesson}.'
        cta: Follow for build logs
      - id: x-ship_log-04
        name: Refactor week — N PRs merged
        hook: 'Refactor week: {n} PRs merged.


          {line_count} lines changed.


          {before_after}.'
        cta: Diff in the replies
      - id: x-ship_log-05
        name: 5 things I shipped this week
        hook: '5 things I shipped this week:


          1. {thing_1}

          2. {thing_2}

          3. {thing_3}

          4. {thing_4}

          5. {thing_5}


          {favorite} was the win.'
        cta: Reply with yours
      - id: x-ship_log-06
        name: The commit that almost didn't ship
        hook: 'Almost didn''t ship this commit.


          {reason}.


          {why_i_pushed_anyway}.'
        cta: Follow for daily commits
      - id: x-ship_log-07
        name: I rewrote it. Twice. Here's why.
        hook: 'I rewrote {feature}.


          Once because it was slow.


          Once because it was unclear.


          {v1_metric} → {v2_metric}.'
        cta: RT if you've done this
      - id: x-ship_log-08
        name: Velocity is a vanity metric. Throughput isn't.
        hook: 'Velocity is a vanity metric.


          Throughput isn''t.


          This week: {lines_written} vs {lines_shipping}.'
        cta: Follow for honest metrics
      - id: x-ship_log-09
        name: The boring commit that fixed everything
        hook: 'The boring commit that fixed everything:


          +{n} lines, -{m} lines.


          No framework. No architecture diagram. Just {what_it_did}.'
        cta: RT the boring commits
      - id: x-ship_log-10
        name: Why I deleted that feature
        hook: 'Deleted {feature} today.


          {users_using_it} users used it.


          {why_i_deleted_it_anyway}.'
        cta: Follow for less-is-more builds
    - id: product
      name: Product — BiP Core
      defaults:
        psych_triggers:
        - pride
        - curiosity
        - trust
        - greed
        anti_patterns:
        - generic_advice
        - no_emotion
        body: narrative
        best_for:
          archetypes:
          - S2
          - S8
          - S1
          meaning_axes:
          - leverage
          - systemic
          - behavioral
          funnel_stages:
          - MOFU
          - TOFU
          icp_layers:
          - L2
          - L3
      templates:
      - id: x-product-01
        name: We just shipped X. Here's why it took 4 months.
        hook: 'We just shipped {feature}.


          Took 4 months. Here''s why:


          - {reason_1}

          - {reason_2}

          - {reason_3}


          The lesson is not about shipping fast. The lesson is about shipping right.'
        cta: RT if you've waited
      - id: x-product-02
        name: v2 is live. 3 things that changed.
        hook: 'v2 is live.


          3 things changed:


          1. {change_1}

          2. {change_2}

          3. {change_3}


          The architecture is the same. The story is not.'
        cta: Try v2 → link in bio
      - id: x-product-03
        name: What's new in the engine
        hook: 'What''s new in the engine this month:


          - {feature_1}

          - {feature_2}

          - {feature_3}


          The killer is at the bottom.'
        cta: Try it → link in reply
      - id: x-product-04
        name: Built for builders, not marketers
        hook: 'Built for builders, not marketers.


          If you''ve ever opened a tool and felt like it was designed for someone
          else, this is for you.


          If you have never opened a tool, this is also for you.'
        cta: RT if this resonates
      - id: x-product-05
        name: We killed 2 features. Here's what we kept.
        hook: 'We killed 2 features this month.


          {feature_a} and {feature_b}.


          {users_using_each} users used each.


          Here''s what we kept instead, and why:'
        cta: Reply with what you killed
      - id: x-product-06
        name: Open source is the launch
        hook: 'Open source is the launch.


          We made {project} public today.


          {lines_of_code} lines. {contributors} contributors. {license} license.


          Here''s the link in the reply.'
        cta: Star it → link in reply
      - id: x-product-07
        name: X is now in public beta
        hook: '{product} is now in public beta.


          What''s in: {feature_1}, {feature_2}, {feature_3}.

          What''s next: {feature_4}, {feature_5}.


          {cta} → link in reply'
        cta: Try the beta → link in reply
      - id: x-product-08
        name: Why we built this
        hook: 'Why we built {product}:


          {problem} was killing us.


          Every existing tool solved it wrong — {wrong_solutions}.


          So we built our own. Here''s the story:'
        cta: Read the full story
      - id: x-product-09
        name: Pricing is the product
        hook: 'Pricing is the product.


          We just changed ours. Here''s why:


          {old_pricing} → {new_pricing}.


          The math is in the reply.'
        cta: Reply if you agree
      - id: x-product-10
        name: The feature post I wish I'd seen before building
        hook: 'The feature post I wish I''d seen before building {feature}:


          {what_it_does}, {why_it_matters}, {who_its_for}.


          If you are building something similar, this is the post I want you to read.'
        cta: Reply if you're building
    - id: milestone
      name: Milestone — BiP Core
      defaults:
        psych_triggers:
        - pride
        - fomo
        - trust
        - curiosity
        anti_patterns:
        - no_emotion
        - buried_value
        body: narrative
        best_for:
          archetypes:
          - S1
          - S6
          - S10
          meaning_axes:
          - human
          - leverage
          - systemic
          funnel_stages:
          - MOFU
          - TOFU
          - BOFU
          icp_layers:
          - L1
          - L2
          - L3
      templates:
      - id: x-milestone-01
        name: 1k users. Here's the weird one.
        hook: '1k users. Here''s the weird one:


          {weird_user_1} signed up because {weird_reason}.


          It has changed how I think about who this is for.'
        cta: RT if you've hit 1k
      - id: x-milestone-02
        name: From 0 to $X MRR in N days
        hook: '0 → ${mrr} MRR in {days} days.


          {users} paying customers. {avg_revenue} ARPU.


          Here''s the math nobody showed me:'
        cta: Reply with your MRR
      - id: x-milestone-03
        name: We hit 100 paying customers
        hook: '100 paying customers.


          {n} of them are {persona_1}. {m} are {persona_2}.


          {one_thing_i_learned} was the unlock.'
        cta: Save for your 100
      - id: x-milestone-04
        name: The 1% who showed up at week 1
        hook: '1% of users show up at week 1. The other 99% are noise.


          At {user_count} users, here''s what the 1% look like:'
        cta: Follow for retention data
      - id: x-milestone-05
        name: First $1k. Here's the math.
        hook: 'First $1k MRR.


          {how_long_it_took}. {what_i_was_wrong_about}. {one_thing_that_worked}.


          The math is in the reply.'
        cta: Reply with your $1k
      - id: x-milestone-06
        name: 100 posts. What the data says.
        hook: '100 posts published.


          Top 3 by engagement:

          1. {post_1} — {eng_1}

          2. {post_2} — {eng_2}

          3. {post_3} — {eng_3}


          The pattern: {what_worked}.'
        cta: Follow for the data
      - id: x-milestone-07
        name: The number nobody asked me about
        hook: 'The number nobody asks me about: {weird_metric}.


          {what_it_means} and {why_it_matters}.'
        cta: Reply with your weird metric
      - id: x-milestone-08
        name: Year 1 in numbers
        hook: 'Year 1 in numbers:


          - {metric_1}

          - {metric_2}

          - {metric_3}

          - {metric_4}

          - {metric_5}


          The number I''m proud of: {quiet_win}.'
        cta: Save for your year 1
      - id: x-milestone-09
        name: The day I stopped counting
        hook: 'I stopped counting {metric} on {date}.


          {what_changed} and {what_i_realized}.'
        cta: RT if you've stopped counting
      - id: x-milestone-10
        name: Three zeros
        hook: 'Three zeros on the dashboard today.


          {users}. {revenue}. {posts}.


          Not the actual numbers. The number of digits.'
        cta: Reply with your three zeros
    - id: feature
      name: Feature — BiP Expanded
      defaults:
        psych_triggers:
        - curiosity
        - greed
        - trust
        anti_patterns:
        - generic_advice
        - no_emotion
        body: narrative
        best_for:
          archetypes:
          - S2
          - S8
          - S1
          meaning_axes:
          - leverage
          - behavioral
          - systemic
          funnel_stages:
          - MOFU
          - TOFU
          icp_layers:
          - L1
          - L2
          - L3
      templates:
      - id: x-feature-01
        name: Added Y. Here's the one metric that moved.
        hook: 'Added {feature} last week.


          {number} users used it. {metric} moved {percentage}%.


          The thing I did not expect: {surprise}.'
        cta: RT if you ship features
      - id: x-feature-02
        name: The small change that mattered most
        hook: 'The small change that mattered most this month: {feature}.


          {n} lines. {m} days. {result}.'
        cta: Follow for build logs
      - id: x-feature-03
        name: I added a feature nobody asked for
        hook: 'I added {feature}. Nobody asked for it.


          {users_using_it} users tried it in the first {timeframe}. {feedback}.'
        cta: RT if you build unprompted
      - id: x-feature-04
        name: The feature I almost killed
        hook: 'Almost killed {feature}. {users_using_it} users used it. {percentage}%
          of them were power users.


          I kept it. Here''s the framework I used:'
        cta: Save for feature decisions
      - id: x-feature-05
        name: Why I added a feature you won't see
        hook: 'Added {feature} today. You will not see it.


          {why_invisible} and {why_it_matters}.'
        cta: Follow for invisible work
      - id: x-feature-06
        name: 'Added Y, removed Z. Net: same lines, more value.'
        hook: 'Added {feature_a}, removed {feature_b}.


          Net: same lines of code. {metric} moved {percentage}%.'
        cta: Reply with your swaps
      - id: x-feature-07
        name: The feature that 3 users asked for
        hook: '3 users asked for {feature}.


          I built it in a weekend. {result}.'
        cta: RT if you listen to 3
      - id: x-feature-08
        name: The 1% feature I built for me
        hook: 'Built {feature} for me. {users_using_it} other people use it too.


          {why_i_built_it_for_me}.'
        cta: Follow for selfish features
      - id: x-feature-09
        name: The feature I added on a Tuesday
        hook: 'Added {feature} on a Tuesday.


          {why_tuesday} and {what_happened}.'
        cta: Reply with your Tuesday ships
      - id: x-feature-10
        name: What 'small' features look like at scale
        hook: 'At {user_count} users, the small features add up.


          {feature_a} +{metric_a}. {feature_b} +{metric_b}. {feature_c} +{metric_c}.'
        cta: Save for your scale-up
    - id: behind
      name: Behind — BiP Expanded
      defaults:
