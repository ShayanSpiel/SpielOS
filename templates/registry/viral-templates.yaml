version: 1
platforms:
  x:
    categories:
    - id: ship_log
      name: Ship Log — Build in Public
      defaults:
        psych_triggers:
        - curiosity
        - pride
        - belonging
        anti_patterns:
        - generic_advice
        body: narrative
        best_for:
          archetypes:
          - S2
          - S8
          - S10
          meaning_axes:
          - behavioral
          - leverage
          - human
          funnel_stages:
          - TOFU
          - MOFU
          icp_layers:
          - L1
          - L2
          - L3
      templates:
      - id: x-ship-01
        name: Build log — what shipped, what broke
        hook: "Day {n}.\n\nShipped: {what}.\nBroke: {what_broke}.\n\nBack to work."
      - id: x-ship-02
        name: The bug that ate my week
        hook: "A bug ate my {time_period}.\n\nNot a big problem. A {small_thing}.\n\n{lesson}."
      - id: x-ship-03
        name: I rewrote it. Twice.
        hook: "Rewrote {feature}.\n\nOnce because it was slow.\nOnce because it was unclear.\n\n{v1} \u2192 {v2}."
      - id: x-ship-04
        name: The boring commit that fixed everything
        hook: "The boring commit that fixed everything:\n\n+{n} lines, -{m} lines.\n\nNo architecture diagram. Just {what_it_did}."
      - id: x-ship-05
        name: Why I deleted that feature
        hook: "Deleted {feature} today.\n\n{n} users used it.\n\n{why_i_deleted_it}."
    - id: product
      name: Product — Announcements & Decisions
      defaults:
        psych_triggers:
        - curiosity
        - trust
        anti_patterns:
        - generic_advice
        body: narrative
      templates:
      - id: x-product-01
        name: v2 is live — 3 things changed
        hook: "v2 is live.\n\n3 things changed:\n1. {change_1}\n2. {change_2}\n3. {change_3}\n\nThe architecture is the same. The story is not."
      - id: x-product-02
        name: Why we built this
        hook: "Why we built {product}:\n\n{problem} was killing us.\n\nEvery existing tool solved it wrong. So we built our own."
      - id: x-product-03
        name: We killed 2 features this month
        hook: "Killed {feature_a} and {feature_b}.\n\n{n} users used each.\n\nWhat we kept instead, and why:"
    - id: milestone
      name: Milestone — Honest Metrics
      defaults:
        psych_triggers:
        - pride
        - curiosity
        body: narrative
      templates:
      - id: x-milestone-01
        name: Users milestone — the weird one
        hook: "{n} users.\n\nHere's the weird one: {weird_user} signed up because {weird_reason}.\n\nChanged how I think about who this is for."
      - id: x-milestone-02
        name: The number nobody asked about
        hook: "The number nobody asks me about: {weird_metric}.\n\n{what_it_means} and {why_it_matters}."
      - id: x-milestone-03
        name: Year 1 in numbers
        hook: "Year 1 in numbers:\n\n{metric_1}\n{metric_2}\n{metric_3}\n{metric_4}\n{metric_5}\n\nThe number I'm proud of: {quiet_win}."
  linkedin:
    categories:
    - id: vulnerability
      name: Vulnerability — Lessons Learned
      defaults:
        psych_triggers:
        - belonging
        - hope
        anti_patterns:
        - generic_advice
        body: narrative
      templates:
      - id: li-vuln-01
        name: The post I've been avoiding writing
        hook: "This is the post I've been avoiding writing.\n\n{internal_fear} kept me quiet.\n\nHere's what I learned keeping it inside: {lesson}."
      - id: li-vuln-02
        name: I don't have this figured out
        hook: "I don't have this figured out.\n\nBut here's what I'm learning: {raw_lesson}.\n\nFrom the messy middle."
      - id: li-vuln-03
        name: I spent years optimizing for the wrong thing
        hook: "Spent years optimizing for the wrong metric.\n\nVanity metric: {vanity_metric}.\nReal strategy: {real_strategy}.\nOutcome: {outcome}."
    - id: paradigm
      name: Paradigm — Professional Theories
      defaults:
        psych_triggers:
        - curiosity
        - pride
        anti_patterns:
        - generic_advice
        body: take
      templates:
      - id: li-paradigm-01
        name: Stop overcomplicating a task
        hook: "Stop overcomplicating {task}.\n\n{complex_workflows} lead to inaction.\n\nTry the {time}-minute version instead."
      - id: li-paradigm-02
        name: Consistency is overrated — depth drives results
        hook: "Consistency is overrated.\n\n{quality_metric} drives {outcome}.\n\n1 high-depth post > {n} generic posts."
      - id: li-paradigm-03
        name: The best strategy is not having one
        hook: "The best {domain} strategy?\n\nNot having one.\n\n{transactional_approach} builds low trust. {alternative} builds real connection."
    - id: authority
      name: Authority — Field Lessons
      defaults:
        psych_triggers:
        - trust
        body: narrative
      templates:
      - id: li-auth-01
        name: "N years of field lessons in one post"
        hook: "{years} years of {field} lessons in one post.\n\nStarting point: {starting_point}.\nGoal: {goal}.\nFramework: {framework}.\nOutcome: {outcome}."
      - id: li-auth-02
        name: What I learned after N projects
        hook: "What I learned after {n} {project_type}:\n\nCommon problem: {common_problem}.\nCommon fix: {common_solution}.\n{one_surprising_thing}."
      - id: li-auth-03
        name: The {timeframe} case study
        hook: "{timeframe} ago: {client} asked for {request}.\n\nToday: {result}.\n\nWhat changed? One thing: {one_change}."
  blog:
    categories:
    - id: pillar
      name: Pillar — Source of Truth
      defaults:
        body: essay
      templates:
      - id: blog-pillar-01
        name: The concept framework
        hook: "The {concept} framework.\n\n{problem_statement}\n\nMost people solve it with {common_approach}. I think there's a better way."
      - id: blog-pillar-02
        name: What I believe about a topic
        hook: "What I believe about {topic}.\n\n{n} convictions:\n1. {conviction_1}\n2. {conviction_2}\n3. {conviction_3}\n\nWhat I'm still unsure about: {uncertainty}."
      - id: blog-pillar-03
        name: The anatomy of a pattern
        hook: "The anatomy of {pattern}.\n\n{observation}.\n\nHere's how it works, why it matters, and what to do about it."

