  pillar:
    categories:
    - id: system
      name: System Breakdown — How Things Really Work
      defaults:
        psych_triggers:
        - curiosity
        - trust
        - pride
        anti_patterns:
        - generic_advice
        - no_emotion
        body: narrative
        best_for:
          archetypes:
          - S1
          - S7
          - S9
          meaning_axes:
          - systemic
          - philosophical
          funnel_stages:
          - MOFU
          - BOFU
          icp_layers:
          - L3
          - L4
      templates:
      - id: pillar-system-01
        name: The hidden architecture behind common outcome
        hook: 'The Hidden Architecture Behind {outcome}: Why most people miss the
          real mechanism → The {layers} layers that actually drive it → How to build
          your own'
        cta: Map your own system
      - id: pillar-system-02
        name: Why common practice fights reality — and what works instead
        hook: 'Why {common_practice} Fights Reality: The fundamental tension → Why
          conventional wisdom is wrong → The {alternative} that aligns with how it
          actually works'
        cta: Rebuild your approach
      - id: pillar-system-03
        name: The N tensions that define domain
        hook: 'The {number} Tensions That Define {domain}: The trade-off most people
          ignore → How each tension creates a constraint → The system that resolves
          all {number} at once'
        cta: Download the tension map
      - id: pillar-system-04
        name: From first principles to production system
        hook: 'From First Principles to Production {system}: The {number} irreducible
          components → How each maps to a real implementation → The complete architecture'
        cta: Study the blueprint
      - id: pillar-system-05
        name: The feedback loop nobody talks about
        hook: 'The Feedback Loop Nobody Talks About: The invisible cycle that determines
          {outcome} → Why {common_fix} makes it worse → The intervention that breaks
          the loop'
        cta: Trace your own loops
    - id: methodology
      name: Methodology — Frameworks You Can Apply
      defaults:
        psych_triggers:
        - greed
        - trust
        - curiosity
        anti_patterns:
        - generic_advice
        - no_payoff
        body: list
        best_for:
          archetypes:
          - S4
          - S9
          - S8
          meaning_axes:
          - behavioral
          - leverage
          funnel_stages:
          - MOFU
          - BOFU
          icp_layers:
          - L2
          - L3
      templates:
      - id: pillar-method-01
        name: The methodology framework for achieving goal
        hook: 'The {name} Methodology: A {number}-step framework for {goal} that I
          refined over {timeframe} — Step {number} is the one most people skip'
        cta: Apply the framework
      - id: pillar-method-02
        name: Stop doing X — start doing Y instead
        hook: 'Stop Doing {bad_practice}. Start Doing {good_practice} Instead: Why
          {bad_practice} feels productive → The hidden cost → The {steps}-step replacement
          system'
        cta: Switch today
      - id: pillar-method-03
        name: The N-question diagnostic for diagnosing domain problem
        hook: 'The {number}-Question Diagnostic for {domain}: Most people treat the
          symptom — these {number} questions find the root in {timeframe} minutes'
        cta: Run your diagnostic
      - id: pillar-method-04
        name: How to decide between option and option
        hook: 'How to Decide Between {option_1} and {option_2}: The decision framework
          that eliminates regret → When to pick each → The one question that makes
          it obvious'
        cta: Save for your next decision
      - id: pillar-method-05
        name: The N-phase system for building durable skill
        hook: 'The {number}-Phase System for Building {skill}: Phase {phase} is where
          most people quit → Why each phase exists → How to know you are ready for
          the next'
        cta: Start phase one
    - id: teardown
      name: Teardown — Deconstructing What Works
      defaults:
        psych_triggers:
        - curiosity
        - anger
        - pride
        anti_patterns:
        - no_emotion
        - too_complex
        body: narrative
        best_for:
          archetypes:
          - S3
          - S5
          - S6
          meaning_axes:
          - contrarian
          - human
          funnel_stages:
          - MOFU
          - TOFU
          icp_layers:
          - L3
          - L4
      templates:
      - id: pillar-teardown-01
        name: A deep dive into example — what they got right
        hook: 'A Deep Dive Into {example}: What most people missed → The {number}
          strategic moves that made it work → Why copying them fails and what to do
          instead'
        cta: Study the full analysis
      - id: pillar-teardown-02
        name: Why popular product/success actually failed
        hook: 'Why {popular_success} Actually Failed: The surface narrative → The
          hidden contradiction → The {number} lessons nobody extracted'
        cta: Read the post-mortem
      - id: pillar-teardown-03
        name: Dissecting the approach that everyone recommends
        hook: 'Dissecting the {approach} Everyone Recommends: Where it works → Where
          it silently fails → The context switch that determines outcome'
        cta: Get the decision matrix
      - id: pillar-teardown-04
        name: My N biggest mistakes building project
        hook: 'My {number} Biggest Mistakes Building {project}: The embarrassing failures
          → What I thought was right at each step → The pattern that connects them
          all'
        cta: Avoid these mistakes
      - id: pillar-teardown-05
        name: I spent timeframe doing X — here is exactly what happened
        hook: 'I Spent {timeframe} Doing {experiment}: The raw data → What surprised
          me → The {number} actionable lessons that changed my approach permanently'
        cta: Run your own experiment
    - id: educational
      name: Educational — Teaching Concepts That Stick
      defaults:
        psych_triggers:
        - curiosity
        - trust
        - fomo
        anti_patterns:
        - generic_advice
        - no_payoff
        body: analysis
        best_for:
          archetypes:
          - S7
          - S1
          - S10
          meaning_axes:
          - philosophical
          - systemic
          funnel_stages:
          - TOFU
          - MOFU
          icp_layers:
          - L1
          - L2
      templates:
      - id: pillar-edu-01
        name: The concept explained — from confusion to clarity
        hook: '{concept}, Explained: Why it feels confusing → The {number} core ideas
          that unlock everything → How to think about it, not just memorize it'
        cta: Master the concept
      - id: pillar-edu-02
        name: The mental model that changed how I think about domain
        hook: 'The Mental Model That Changed How I Think About {domain}: The framing
          that reframed everything → How to apply it in {timeframe} minutes → Why
          most people get it backwards'
        cta: Adopt the model
      - id: pillar-edu-03
        name: Rethinking common assumption — a new framework
        hook: 'Rethinking {common_assumption}: The evidence that contradicts it →
          The new framework that explains the data better → What changes when you
          adopt it'
        cta: Challenge your assumptions
      - id: pillar-edu-04
        name: Understanding principle through concrete example
        hook: 'Understanding {principle} Through {concrete_example}: The abstract
          idea → The real-world case → How to generalize it to your context'
        cta: Read with a notebook
      - id: pillar-edu-05
        name: The spectrum from novice to master in discipline
        hook: 'The Spectrum From Novice to Master in {discipline}: What changes at
          each stage → The bottleneck preventing progress → The deliberate practice
          that accelerates growth'
        cta: Find your stage
