# templates/registry/viral-templates.yaml
# Master Content Strategy: 150 Viral Hooks and Templates for 2026
# 50 X (Twitter) + 50 LinkedIn + 50 Blog
# Source: /Users/shayan/Desktop/Master Content Strategy Document_ 150 Viral Hooks and Templates for 2026.md
#
# Each hook/cta uses {slots} for LLM substitution at draft time.
# best_for maps to strategy_classifier outputs (archetype, meaning_axis, funnel_stage, icp_layer).
version: 1
platforms:

  # ═══════════════════════════════════════════════════════════════════════════
  # X (Twitter) — 50 Templates (5 categories × 10)
  # ═══════════════════════════════════════════════════════════════════════════
  x:
    categories:

      # ─── Listicles: Resource Curation & Tools ──────────────────────────
      - id: listicle
        name: Listyles — Resource Curation
        defaults:
          psych_triggers: [greed, curiosity]
          anti_patterns: [generic_advice]
          body: list
          best_for:
            archetypes: [S4, S8, S7]
            meaning_axes: [leverage, behavioral]
            funnel_stages: [TOFU]
            icp_layers: [L1, L2]
        templates:
          - id: x-listicle-01
            name: 7 Free tools for X to achieve Y
            hook: "{number} free tools for {persona} to achieve {result}: 1) {tool_1} — {function_1}, 2) {tool_2} — {function_2}"
            cta: "Bookmark this for your {year} stack"

          - id: x-listicle-02
            name: Steal these N assets that result Y
            hook: "Steal these {number} {asset_type} that {result}: {list}"
            cta: "RT for your network"

          - id: x-listicle-03
            name: Number lessons I wish I knew timeframe ago
            hook: "{number} {lesson_type} I wish I knew {timeframe} ago about {topic}: {list}"
            cta: "Follow @{handle} for daily {niche} tips"

          - id: x-listicle-04
            name: The subject stack for goal without pain
            hook: "My personal {category} stack for {goal} without {pain}: {tool_1}, {tool_2}"
            cta: "Click the link for the full breakdown"

          - id: x-listicle-05
            name: N topic tactics I wish I knew N years ago
            hook: "{number} {topic} tactics I wish I knew {timeframe} ago: 🧵"
            cta: "Follow for more {niche} threads"

          - id: x-listicle-06
            name: Number resources for audience
            hook: "{number} resources for {audience} to {solve}: {list}"
            cta: "Save this thread for later"

          - id: x-listicle-07
            name: Number things I learned from experience
            hook: "{number} lessons I learned from {experience}: {lesson_1}, {lesson_2}"
            cta: "RT if this helped you"

          - id: x-listicle-08
            name: My personal stack for task in year
            hook: "My personal stack for {task} in {year}: {tool_1}, {tool_2}"
            cta: "Follow for more curation"

          - id: x-listicle-09
            name: Number subjects that result in N days
            hook: "{number} {asset_type} that {result} in {timeframe}: {list}"
            cta: "RT to help a founder"

          - id: x-listicle-10
            name: Number lessons I wish I learned at age/phase
            hook: "{number} lessons I wish I learned in my {career_phase}: {lesson_1}, {lesson_2}"
            cta: "Follow for more insights"

      # ─── Contrarian: Paradigm Shifts ───────────────────────────────────
      - id: contrarian
        name: Contrarian — Paradigm Shifts
        defaults:
          psych_triggers: [fear, anger, curiosity, pride]
          anti_patterns: [no_emotion, generic_advice]
          body: take
          best_for:
            archetypes: [S3, S9, S5]
            meaning_axes: [contrarian, philosophical, behavioral]
            funnel_stages: [MOFU]
            icp_layers: [L3, L4]
        templates:
          - id: x-contrarian-01
            name: Unpopular opinion — belief is overrated
            hook: "Unpopular opinion: {common_belief} is overrated. {pragmatic_alternative}"
            cta: "What's your take?"

          - id: x-contrarian-02
            name: You don't need X. You need Y.
            hook: "You don't need {popular_item}. You need {better_alternative}"
            cta: "RT to save a peer"

          - id: x-contrarian-03
            name: Common practice is dead. Here's what replaces it.
            hook: "{standard_practice} is dead. Here is what is replacing it for {goal}: {new_trend}"
            cta: "Follow for the update"

          - id: x-contrarian-04
            name: Stop optimizing for vanity metric
            hook: "Stop optimizing for {metric_a}. Do this instead to build {metric_b}: {action}"
            cta: "RT for awareness"

          - id: x-contrarian-05
            name: Everyone is doing task wrong
            hook: "Everyone is doing {task} wrong. Here is why {problem} is happening: {evidence}"
            cta: "Follow for the fix"

          - id: x-contrarian-06
            name: The industry doesn't want you to know this
            hook: "The {industry} does not want you to know this: {revelation}"
            cta: "Bookmark before this is deleted"

          - id: x-contrarian-07
            name: Subject is not about belief. It's about truth.
            hook: "{topic} is not about {common_belief}. It's about {actual_truth}"
            cta: "Follow for the truth"

          - id: x-contrarian-08
            name: Hot take with evidence
            hook: "Hot take: {opinion}. I have the {evidence_type} to prove it"
            cta: "Reply with your take"

          - id: x-contrarian-09
            name: Why conventional advice is a scam
            hook: "Why {conventional_advice} is a scam — and what actually builds {result}: {strategy}"
            cta: "RT to expose the truth"

          - id: x-contrarian-10
            name: Popular belief is failing you
            hook: "{common_advice} is failing you. Here is the alternative: {action}"
            cta: "Follow for results"

      # ─── Story: Transformation & Failure ─────────────────────────────
      - id: story
        name: Story — Transformation & Failure
        defaults:
          psych_triggers: [hope, fear, guilt, belonging]
          anti_patterns: [no_emotion, buried_value]
          body: narrative
          best_for:
            archetypes: [S4, S5, S2]
            meaning_axes: [human, behavioral, philosophical]
            funnel_stages: [TOFU, MOFU]
            icp_layers: [L3, L4]
        templates:
          - id: x-story-01
            name: I went from low point to high point in N time
            hook: "I went from {low_point} to {high_point} in {timeframe}. Here is exactly how: 🧵"
            cta: "Follow for the blueprint"

          - id: x-story-02
            name: I achieved X doing simple thing
            hook: "I achieved {milestone} doing {simple_habit}. Here's how"
            cta: "RT to share the simple path"

          - id: x-story-03
            name: Time ago I was situation — today transformation
            hook: "{time} ago, I was {scenario}. Today, {success}. Here is what happened"
            cta: "Follow my journey"

          - id: x-story-04
            name: I almost failed — then insight changed everything
            hook: "I almost failed at {task}. Then {pivotal_event} changed everything"
            cta: "RT for the lesson"

          - id: x-story-05
            name: True story — shocking setup with rest
            hook: "True story: {shocking_setup}. Here is the rest of the story"
            cta: "Follow for more"

          - id: x-story-06
            name: Last year I made a massive mistake
            hook: "Last year, I made a {error_type}. It cost me {loss}. Don't let it happen to you"
            cta: "RT to help others avoid this"

          - id: x-story-07
            name: I tested strategy for N time — results shocked me
            hook: "I tested {strategy} for {timeframe}. Here is what happened to my {metric}"
            cta: "Follow for more experiments"

          - id: x-story-08
            name: I wasted $Amount on mistake before realizing this
            hook: "I wasted ${amount} on {mistake} before realizing this single {topic} rule"
            cta: "RT to save your money"

          - id: x-story-09
            name: Nobody believed my claim — now here's proof
            hook: "Nobody believed me when I said {claim}. {time} later, here is the proof"
            cta: "Follow for more proof"

          - id: x-story-10
            name: I stopped action — this happened to my metric
            hook: "I stopped {action} for {timeframe}. The results shocked my {metric}"
            cta: "RT if you're trying this"

      # ─── Data: Original Analysis & Proof ─────────────────────────────
      - id: data
        name: Data — Original Analysis & Proof
        defaults:
          psych_triggers: [curiosity, fear, trust, fomo]
          anti_patterns: [generic_advice, no_emotion]
          body: analysis
          best_for:
            archetypes: [S7, S1, S10]
            meaning_axes: [systemic, philosophical]
            funnel_stages: [MOFU, TOFU]
            icp_layers: [L2]
        templates:
          - id: x-data-01
            name: I analyzed N items and found pattern
            hook: "I analyzed {number} {assets} and found {pattern}: {findings}"
            cta: "Bookmark for your data bank"

          - id: x-data-02
            name: N items analyzed — X% used this opening
            hook: "{number} {assets} analyzed. {percentage} used this exact {element}: {result}"
            cta: "RT for the strategy"

          - id: x-data-03
            name: I reviewed 1,000 items — here are the patterns
            hook: "I reviewed 1,000 {niche_assets}. Here are the {number} patterns that {result}"
            cta: "Follow for more analysis"

          - id: x-data-04
            name: Tested across N accounts with X% success rate
            hook: "Tested across {number} {accounts_type} with an {percentage} success rate: {framework}"
            cta: "RT to help a creator"

          - id: x-data-05
            name: The numbers don't lie — stat vs average
            hook: "The numbers don't lie: {metric} jumped {percentage} with this single change"
            cta: "Follow for data-driven tips"

          - id: x-data-06
            name: I analyzed 5,000 platform posts
            hook: "I analyzed 5,000 {platform} posts and found the sweet spot: {metric_detail}"
            cta: "RT to share the data"

          - id: x-data-07
            name: Data shows high-arousal emotions drive X% more shares
            hook: "Data shows {emotion_type} drives {percentage} more {metric}. Proof:"
            cta: "Follow for more {platform} science"

          - id: x-data-08
            name: Analyzed 10,000 viral posts — here are 5 patterns
            hook: "I analyzed 10,000 viral posts. {number} patterns appeared in {percentage}%. Here they are:"
            cta: "Bookmark this thread"

          - id: x-data-09
            name: Platform algorithm prioritized signal in 2026
            hook: "{platform}'s algorithm prioritized {signal} in {year}. Here is the evidence:"
            cta: "RT to stay updated"

          - id: x-data-10
            name: Metric jumped X% with this single change
            hook: "{metric} jumped {percentage} after I replaced {step_a} with {step_b}"
            cta: "Follow for more tests"

      # ─── Interactive: Engagement Loops ──────────────────────────────
      - id: interactive
        name: Interactive — Engagement Loops
        defaults:
          psych_triggers: [belonging, pride, greed, curiosity]
          anti_patterns: [no_payoff]
          body: question
          best_for:
            archetypes: [S6, S3, S9]
            meaning_axes: [behavioral, human]
            funnel_stages: [BOFU, TOFU]
            icp_layers: [L1, L3]
        templates:
          - id: x-interactive-01
            name: In one word describe topic
            hook: "In one word, describe your biggest {challenge}:"
            cta: "Reply below"

          - id: x-interactive-02
            name: Drop your asset — I'll send feedback
            hook: "Drop your {asset} below. I'll send you 1 {tweak} to {benefit}"
            cta: "RT and reply"

          - id: x-interactive-03
            name: Which is better — A or B?
            hook: "Which is better for {goal}: A) {option_1} or B) {option_2}?"
            cta: "Vote in replies"

          - id: x-interactive-04
            name: Question + hint + promise to reveal
            hook: "{question} + {hint} + Promise to reveal in thread: 🧵"
            cta: "RT to unlock the answer"

          - id: x-interactive-05
            name: Struggling with pain point? I'll help N people
            hook: "Struggling with {pain_point}? I'll help {number} people for free today"
            cta: "Reply with your {asset_or_problem}"

          - id: x-interactive-06
            name: What's the biggest niche mistake?
            hook: "What's the biggest {niche} mistake you've seen this {timeframe}?"
            cta: "Share in the replies"

          - id: x-interactive-07
            name: Binary choice — concept A vs concept B
            hook: "Binary choice: {concept_a} vs {concept_b}. Which wins in {year}?"
            cta: "Quote tweet with your winner"

          - id: x-interactive-08
            name: Reciprocity — share template with everyone who RTs
            hook: "I'll share my {valuable_asset} with everyone who RTs this"
            cta: "RT and DM \"{keyword}\""

          - id: x-interactive-09
            name: If you could achieve goal by tomorrow
            hook: "If you could achieve {goal} by tomorrow, what would you do first?"
            cta: "Reply with your plan"

          - id: x-interactive-10
            name: Trending topic lessons for niche
            hook: "Everyone's talking about {trend}. Here are {number} lessons for {audience}"
            cta: "RT to join the conversation"

  # ═══════════════════════════════════════════════════════════════════════════
  # LinkedIn — 50 Templates (5 categories × 10)
  # ═══════════════════════════════════════════════════════════════════════════
  linkedin:
    categories:

      # ─── Authority: Case Studies & Results (STAR/PAS) ────────────────
      - id: authority
        name: Authority — Case Studies & Results
        defaults:
          psych_triggers: [trust, greed, pride]
          anti_patterns: [generic_advice, no_emotion]
          body: narrative
          best_for:
            archetypes: [S1, S7, S10]
            meaning_axes: [systemic, leverage, human]
            funnel_stages: [MOFU, BOFU]
            icp_layers: [L2, L3]
        templates:
          - id: li-authority-01
            name: 47 inbound leads from one LinkedIn post
            hook: "{number} inbound leads. From one LinkedIn post. Here is the STAR breakdown: Situation → {situation}. Task → {task}. Action → {action}. Result → {result}"
            cta: "Check my profile score for similar growth fixes"

          - id: li-authority-02
            name: We cut our sales cycle in half with one change
            hook: "We cut our {metric} in half with one change. Problem: {old_frustration}. Agitation: {cost}. Solution: {single_tweak}"
            cta: "Comment \"Case Study\" for the full PDF"

          - id: li-authority-03
            name: Client lost a $50K account — best thing to happen
            hook: "Client lost a ${amount} {asset}. It was the best thing to happen. Problem: {loss}. Agitation: {fear}. Solution: {restructure} → {result}"
            cta: "Save this for your next strategy session"

          - id: li-authority-04
            name: This asset has a 68% response rate — steal it
            hook: "This {asset} has a {percentage} response rate. Steal it: Situation → {situation}. Task → {task}. Action → {exact_template}. Result → {response_rate}"
            cta: "Share with your sales team"

          - id: li-authority-05
            name: X years of field lessons in one post
            hook: "{years} years of {field} lessons in one post. Situation → {starting_point}. Task → {goal}. Action → {framework}. Result → {outcome}"
            cta: "Follow for weekly executive deep-dives"

          - id: li-authority-06
            name: Meet the role who achieved result in timeframe
            hook: "Meet the {role} who achieved {result} in {timeframe}. Situation → {humble_start}. Task → {ambitious_goal}. Action → {strategy}. Result → {milestone}"
            cta: "Check my newsletter for the full story"

          - id: li-authority-07
            name: I reviewed 100 profiles — here is the pattern
            hook: "I reviewed {number} {asset}. Here is the pattern. Problem: {common_failure}. Agitation: {cost_of_being_ignored}. Solution: {optimization_patterns}"
            cta: "Fix your profile using these steps"

          - id: li-authority-08
            name: Company achieved milestone valuation — here's how
            hook: "{company} just achieved {milestone} valuation. Here's how: Situation → {origin}. Task → {scaling_goal}. Action → {core_pivot}. Result → {valuation}"
            cta: "Comment your thoughts on this strategy below"

          - id: li-authority-09
            name: As someone who helped 50 founders achieve result
            hook: "As someone who helped {number} {persona} achieve {result}: Problem → {common_struggle}. Agitation → {bottleneck}. Solution → {high_leverage_move}"
            cta: "Save for later when you scale"

          - id: li-authority-10
            name: I doubled our metric with a single visual tweak
            hook: "I doubled our {metric} with a single {tweak_type}. Situation → {flat_performance}. Task → {increase_goal}. Action → {pattern_interrupt}. Result → {multiple}x {metric}"
            cta: "Check my profile for more growth hacks"

      # ─── Vulnerability: Lessons Learned ──────────────────────────────
      - id: vulnerability
        name: Vulnerability — Lessons Learned
        defaults:
          psych_triggers: [guilt, hope, belonging]
          anti_patterns: [no_emotion, buried_value]
          body: narrative
          best_for:
            archetypes: [S4, S5, S2]
            meaning_axes: [human, behavioral, philosophical]
            funnel_stages: [TOFU, MOFU]
            icp_layers: [L3, L4]
        templates:
          - id: li-vulnerability-01
            name: This is the post I've been avoiding writing
            hook: "This is the post I've been avoiding writing. Problem: {internal_fear}. Agitation: {cost_of_silence}. Solution: {admitting_failure} + {lesson}"
            cta: "Comment if you've felt this too"

          - id: li-vulnerability-02
            name: I almost gave up on agency three months ago
            hook: "I almost gave up on {venture} {timeframe} ago. Situation → {crisis}. Task → {save_goal}. Action → {drastic_restructure}. Result → {recovery} + {growth}"
            cta: "Follow for more honest building"

          - id: li-vulnerability-03
            name: I don't have this figured out — but here's what I'm learning
            hook: "I don't have this figured out. But here's what I'm learning: Problem → {scaling_challenge}. Agitation → {confusion}. Solution → {raw_lessons} from the messy middle"
            cta: "Share your experience with this below"

          - id: li-vulnerability-04
            name: I spent years optimizing for the wrong metric
            hook: "I spent years optimizing for the wrong metric. Problem → {vanity_metric}. Agitation → {zero_business_result}. Solution → pivot to {real_strategy} → {outcome}"
            cta: "Save this to avoid the vanity trap"

          - id: li-vulnerability-05
            name: I almost quit after 10 posts flopped
            hook: "I almost quit after {number} posts flopped. Situation → {zero_engagement}. Task → {establish_presence}. Action → {formula_switch}. Result → {viral_growth}"
            cta: "Follow for the real journey"

          - id: li-vulnerability-06
            name: I thought I found the perfect position — I was wrong
            hook: "I thought I found the perfect {position}. I was wrong. Problem → {dream_illusion}. Agitation → {mental_toll}. Solution → {departure_decision} + {new_path}"
            cta: "Comment your biggest career shift"

          - id: li-vulnerability-07
            name: Three years ago I walked out of my cubicle
            hook: "{timeframe} ago, I walked out of my {starting_point}. Situation → {routine}. Task → {independence_goal}. Action → {risk_taken}. Result → {current_freedom} + {revenue}"
            cta: "Save for your escape plan"

          - id: li-vulnerability-08
            name: Last year was the most challenging year we faced
            hook: "{year} was the most challenging year our {organization} faced. Problem → {industry_crash}. Agitation → {revenue_loss}. Solution → {survival_moves} that became growth moves"
            cta: "Share your biggest operational lesson"

          - id: li-vulnerability-09
            name: I used to think bad advice was a badge of honor
            hook: "I used to think {bad_advice} was a badge of honor. Problem → {overwork_culture}. Agitation → {burnout}. Solution → realization that {depth_beats_volume}"
            cta: "Follow for more professional growth"

          - id: li-vulnerability-10
            name: I'm taking back the advice I gave for 5 years
            hook: "I'm taking back the advice I gave for {years} years. Problem → {old_advice}. Agitation → {algorithm_fatigue}. Solution → new strategy: {new_approach}"
            cta: "Comment \"Agree\" or \"Disagree\""

      # ─── De-risking: Cautionary & Preventive ─────────────────────────
      - id: de-risking
        name: De-risking — Cautionary & Preventive
        defaults:
          psych_triggers: [fear, fomo, trust]
          anti_patterns: [generic_advice, no_emotion]
          body: list
          best_for:
            archetypes: [S3, S9, S5]
            meaning_axes: [behavioral, philosophical]
            funnel_stages: [MOFU, TOFU]
            icp_layers: [L1, L2]
        templates:
          - id: li-de-risking-01
            name: Before you post that carousel read this
            hook: "Before you post that {format}, read this. Problem → {low_reach}. Agitation → {wasted_effort}. Solution → {rules_count} visual rules for {metric}"
            cta: "Save for your next post"

          - id: li-de-risking-02
            name: Stop ignoring metric if you want to scale
            hook: "Stop ignoring {metric} if you want to scale. Problem → {stagnant_growth}. Agitation → {invisible_leak}. Solution → the one number that predicts {outcome}"
            cta: "Comment for the audit sheet"

          - id: li-de-risking-03
            name: Don't start phase without knowing this first
            hook: "Don't start {phase} without knowing this first. Problem → {rushing_in}. Agitation → {risk_type}. Solution → {steps}-step de-risking checklist"
            cta: "Share with a fellow founder"

          - id: li-de-risking-04
            name: Before you hire a type agency ask these questions
            hook: "Before you hire a {agency_type} agency, ask these questions. Problem → {wasted_spend}. Agitation → {frustration}. Solution → {count} screening questions that reveal the truth"
            cta: "Save for your next RFP"

          - id: li-de-risking-05
            name: Avoid this if you want to land corporate deals
            hook: "Avoid this if you want to land {deal_type}: Problem → {bad_pitch_type}. Agitation → {immediate_rejection}. Solution → {reframe_strategy}"
            cta: "Follow for more de-risking tips"

          - id: li-de-risking-06
            name: If you're in role and not doing action you're losing money
            hook: "If you're in {role} and not doing {action}, you're losing money. Problem → {traditional_workflows}. Agitation → {lost_revenue}. Solution → {new_standard}"
            cta: "Check my latest guide"

          - id: li-de-risking-07
            name: The harsh reality of being a role in 2026
            hook: "The harsh reality of being a {role} in {year}: Problem → {market_shift}. Agitation → {role_shrinkage}. Solution → {count} skills required to stay relevant"
            cta: "Comment your plan for the shift"

          - id: li-de-risking-08
            name: Before you accept that counteroffer consider this
            hook: "Before you accept that counteroffer, consider this. Problem → {easy_stay}. Agitation → {regret_timeframe}. Solution → {count} psychological reasons counteroffers fail"
            cta: "Share with your network"

          - id: li-de-risking-09
            name: Stop overcomplicating task — use this simple way
            hook: "Stop overcomplicating {task}. Use this simple way: Problem → {complex_workflows}. Agitation → {inaction}. Solution → the {time}-minute version"
            cta: "Save for later"

          - id: li-de-risking-10
            name: Before you send that cold DM check these 3 things
            hook: "Before you send that cold DM, check these {count} things. Problem → {low_response_rate}. Agitation → {burned_leads}. Solution → profile elements that build instant trust"
            cta: "Follow for better sales"

      # ─── Paradigm: Professional Theories ─────────────────────────────
      - id: paradigm
        name: Paradigm — Professional Theories
        defaults:
          psych_triggers: [curiosity, anger, pride]
          anti_patterns: [no_emotion, generic_advice]
          body: take
          best_for:
            archetypes: [S3, S9, S6]
            meaning_axes: [contrarian, philosophical, systemic]
            funnel_stages: [MOFU, TOFU]
            icp_layers: [L3, L4]
        templates:
          - id: li-paradigm-01
            name: Stop trying to go viral
            hook: "Stop trying to go viral. Seriously. Problem → {chasing_views}. Agitation → {wrong_audience}. Solution → focusing on {strategy_type} for {outcome}"
            cta: "Follow for more strategy"

          - id: li-paradigm-02
            name: Consistency is overrated — depth drives leads
            hook: "Consistency is overrated. {quality_metric} drives {outcome}. Problem → {shallow_posting}. Agitation → {audience_fatigue}. Solution → {ratio}: 1 high-depth post > {number} generic posts"
            cta: "Save for your plan"

          - id: li-paradigm-03
            name: The best networking strategy is not having one
            hook: "The best networking strategy? Not having one. Problem → {transactional_networking}. Agitation → {low_trust}. Solution → focusing on {alternative} over {vanity_metric}"
            cta: "Share your take"

          - id: li-paradigm-04
            name: Networking events are a waste of time
            hook: "Networking events are a waste of time. Here is why: Problem → {time_waste}. Agitation → {low_roi}. Solution → building {trust_mechanism} through content instead"
            cta: "Follow for higher ROI"

          - id: li-paradigm-05
            name: Your content engagement isn't the problem — your offer is
            hook: "Your content engagement isn't the problem. Your offer is. Problem → {optimizing_hooks}. Agitation → {no_sales}. Solution → diagnosing the structural gap in your {offer_type}"
            cta: "Comment for the offer guide"

          - id: li-paradigm-06
            name: Format is the most underrated sales channel in 2026
            hook: "{format_type} is the most underrated sales channel in {year}. Problem → {missing_growth_channels}. Agitation → {rising_cac}. Solution → {strategy} for {engagement_rate} ER"
