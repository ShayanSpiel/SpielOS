name: Wiki Health

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 0"  # every Sunday at 6am

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Validate .wiki-state
        run: |
          python3 -c "
          import yaml
          with open('.wiki-state') as f:
              data = yaml.safe_load(f)
          assert data.get('current_state') == 'IDLE', 'System is not in IDLE state'
          assert data.get('loop') in ('WIKI', 'CONTENT'), 'Invalid loop'
          print('.wiki-state is valid: state=%s, loop=%s' % (data['current_state'], data['loop']))
          "

      - name: Check frontmatter on concept pages
        run: |
          echo "Checking frontmatter on concept pages..."
          python3 -c "
          import os, yaml
          vault = '.'
          for dir in ['concepts', 'templates']:
              dirpath = os.path.join(vault, dir)
              if not os.path.isdir(dirpath):
                  continue
              for f in sorted(os.listdir(dirpath)):
                  if not f.endswith('.md'):
                      continue
                  path = os.path.join(dirpath, f)
                  with open(path) as fh:
                      content = fh.read()
                  if not content.startswith('---'):
                      print(f'  WARN: {path} has no frontmatter')
                      continue
                  parts = content.split('---', 2)
                  if len(parts) < 3:
                      print(f'  WARN: {path} has broken frontmatter')
                      continue
                  fm = yaml.safe_load(parts[1])
                  for field in ['title', 'created', 'updated', 'tags', 'sources']:
                      if field not in fm or fm[field] is None:
                          print(f'  WARN: {path} missing frontmatter field: {field}')
          "

      - name: Summary
        run: |
          echo "=== Repo Health Summary ==="
          echo "State: $(python3 -c "import yaml; d=yaml.safe_load(open('.wiki-state')); print(f\"{d['current_state']} ({d['loop']})\")")"
          echo "Concept files: $(find concepts -name '*.md' | wc -l | tr -d ' ')"
